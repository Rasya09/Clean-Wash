<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Wash - Registrasi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="../css/Login.css" />
</head>
<body>
    <div class="card">

        <!-- Panel Kiri -->
        <div class="panel-left">
            <div class="logo">
                <img class="logo-icon" src="../assets/img/logo.png" alt="Clean Wash Logo" />
            </div>

            <div class="left-body">
                <h2 class="left-heading">Selamat Datang</h2>
                <p class="left-desc">Daftarkan diri anda untuk mulai menggunakan layanan laundry terpercaya kami.</p>
                <div class="illustration">
                    <img class="illus-img" src="../assets/img/Vector.svg" alt="Ilustrasi Laundry" />
                </div>
            </div>

            <p class="left-footer">© 2026 Clean Wash</p>
        </div>

        <!-- Panel Kanan -->
        <div class="panel-right">
            <div class="form-wrap">
                <h1 class="form-title">Masuk</h1>
                <p class="form-subtitle">Buat akun baru Anda</p>

                <form onsubmit="return false;">

                    <div class="field">
                        <span class="field-icon">
                            <img src="../Assets/Icon/User_fill.png" alt="User Icon" />
                        </span>
                        <input type="text" placeholder="Masukkan Email/No HP" autocomplete="username" />
                    </div>

                    <div class="field">
                        <span class="field-icon">
                            <img src="../Assets/Icon/password-01.png" alt="Password Icon" />
                        </span>
                        <input type="password" placeholder="Masukkan Password" autocomplete="new-password" />
                    </div>

                    <div class="forgot-wrap">
                        <a href="#" class="forgot-link">Lupa Password?</a>
                    </div>

                    <button class="btn-login" type="submit"><a href="home.html">Login</a></button>

                </form>

                <p class="form-footer">
                    Belum memiliki akun?
                    <a href="Registrasi.html" class="link-register">Register</a>
                </p>
            </div>
        </div>

    </div>
</body>
</html>
