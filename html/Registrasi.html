<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Wash - Registrasi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="../CSS/Registrasi.css" />
</head>
<body>
    <div class="card">

        <!-- Panel Kiri -->
        <div class="panel-left">
            <div class="logo">
                <img class="logo-icon" src="../Assets/Images/logo.png" alt="Clean Wash Logo" />
            </div>

            <div class="left-body">
                <h2 class="left-heading">Daftar Akun</h2>
                <p class="left-desc">Daftarkan diri anda untuk mulai menggunakan layanan laundry terpercaya kami.</p>
                <div class="illustration">
                    <img class="illus-img" src="../Assets/Images/Vector.svg" alt="Ilustrasi Laundry" />
                </div>
            </div>

            <p class="left-footer">© 2026 Clean Wash</p>
        </div>

        <!-- Panel Kanan -->
        <div class="panel-right">
            <div class="form-wrap">
                <h1 class="form-title">Daftar</h1>
                <p class="form-subtitle">Buat akun baru untuk memulai</p>

                <form onsubmit="return false;">

                    <div class="field">
                        <span class="field-icon">
                            <img src="../Assets/Icon/User_fill.png" alt="User Icon" />
                        </span>
                        <input type="text" placeholder="Nama Lengkap" autocomplete="name" />
                    </div>

                    <div class="field">
                        <span class="field-icon">
                            <img src="../Assets/Icon/Icon Masukan Email.png" alt="Email Icon" />
                        </span>
                        <input type="email" placeholder="Masukan Email" autocomplete="email" />
                    </div>

                    <div class="field">
                        <span class="field-icon">
                            <img src="../Assets/Icon/Icon Masukan No Telepon.png" alt="Phone Icon" />
                        </span>
                        <input type="tel" placeholder="Masukan No Hp" autocomplete="tel" />
                    </div>

                    <div class="field">
                        <span class="field-icon">
                            <img src="../Assets/Icon/password-01.png" alt="Password Icon" />
                        </span>
                        <input type="password" placeholder="Masukkan Password" autocomplete="new-password" />
                    </div>

                    <div class="field">
                        <span class="field-icon">
                            <img src="../Assets/Icon/password-01.png" alt="Konfirmasi Password Icon" />
                        </span>
                        <input type="password" placeholder="Konfirmasi Password" autocomplete="new-password" />
                    </div>

                    <button class="btn-daftar" type="submit">Daftar</button>

                </form>

                <p class="form-footer">
                    Sudah punya akun?
                    <a href="../HTML/Login.html" class="link-login">Login</a>
                </p>
            </div>
        </div>

    </div>
</body>
</html>
